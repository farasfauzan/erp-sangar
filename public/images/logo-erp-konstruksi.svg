<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gradMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e87d2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d46b1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#gradMain)" />

  <!-- Building silhouette - main structure -->
  <g fill="url(#gradLight)">
    <!-- Left tower -->
    <path d="M55 145 L55 75 Q55 65 65 65 L95 65 Q105 65 105 75 L105 145 Z" />
    <!-- Right tower -->
    <path d="M105 145 L105 85 Q105 75 115 75 L145 75 Q155 75 155 85 L155 145 Z" />
    <!-- Center connector -->
    <path d="M85 105 L85 95 Q85 85 95 85 L115 85 Q125 85 125 95 L125 105 Z" />
  </g>

  <!-- Windows - left tower -->
  <g fill="#1e3a5f" opacity="0.6">
    <rect x="62" y="80" width="12" height="12" rx="2" />
    <rect x="62" y="100" width="12" height="12" rx="2" />
    <rect x="62" y="120" width="12" height="12" rx="2" />
    <rect x="62" y="140" width="12" height="12" rx="2" />
  </g>

  <!-- Windows - right tower -->
  <g fill="#1e3a5f" opacity="0.6">
    <rect x="126" y="95" width="12" height="12" rx="2" />
    <rect x="126" y="115" width="12" height="12" rx="2" />
    <rect x="126" y="135" width="12" height="12" rx="2" />
  </g>

  <!-- Windows - center -->
  <g fill="#1e3a5f" opacity="0.6">
    <rect x="92" y="95" width="10" height="10" rx="1" />
    <rect x="108" y="95" width="10" height="10" rx="1" />
  </g>

  <!-- Crane arm (construction element) -->
  <path d="M155 75 L155 50 Q165 35 180 35 L180 45 L160 45 L160 75" stroke="url(#gradAccent)" stroke-width="4" fill="none" stroke-linecap="round" />
  <circle cx="180" cy="35" r="6" fill="url(#gradAccent)" />

  <!-- Database/cylinder icon (ERP data) -->
  <g transform="translate(40, 130)" fill="url(#gradAccent)" opacity="0.9">
    <ellipse cx="20" cy="0" rx="18" ry="6" />
    <path d="M2 0 L2 25 Q2 31 20 31 Q38 31 38 25 L38 0" />
    <ellipse cx="20" cy="25" rx="18" ry="6" />
  </g>

  <!-- Text: ERP -->
  <text x="100" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="white" text-anchor="middle" letter-spacing="2">ERP</text>
  <text x="100" y="198" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#a0c4e8" text-anchor="middle" letter-spacing="4">KONSTRUKSI</text>
</svg>