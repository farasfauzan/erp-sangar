<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="gradMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e87d2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d46b1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#gradMain)" />

  <!-- Building silhouette -->
  <g fill="url(#gradLight)">
    <!-- Left tower -->
    <path d="M18 47 L18 25 Q18 20 23 20 L32 20 Q37 20 37 25 L37 47 Z" />
    <!-- Right tower -->
    <path d="M37 47 L37 28 Q37 23 42 23 L50 23 Q55 23 55 28 L55 47 Z" />
    <!-- Center connector -->
    <path d="M28 34 L28 30 Q28 25 32 25 L36 25 Q40 25 40 30 L40 34 Z" />
  </g>

  <!-- Windows - left tower -->
  <g fill="#1e3a5f" opacity="0.6">
    <rect x="20" y="28" width="4" height="4" rx="1" />
    <rect x="20" y="34" width="4" height="4" rx="1" />
    <rect x="20" y="40" width="4" height="4" rx="1" />
    <rect x="20" y="46" width="4" height="4" rx="1" />
  </g>

  <!-- Windows - right tower -->
  <g fill="#1e3a5f" opacity="0.6">
    <rect x="38" y="31" width="4" height="4" rx="1" />
    <rect x="38" y="37" width="4" height="4" rx="1" />
    <rect x="38" y="43" width="4" height="4" rx="1" />
  </g>

  <!-- Windows - center -->
  <g fill="#1e3a5f" opacity="0.6">
    <rect x="30" y="31" width="3" height="3" rx="0.5" />
    <rect x="34" y="31" width="3" height="3" rx="0.5" />
  </g>

  <!-- Crane arm -->
  <path d="M55 23 L55 16 Q58 12 62 12 L62 14 L56 14 L56 23" stroke="url(#gradAccent)" stroke-width="1.5" fill="none" stroke-linecap="round" />
  <circle cx="62" cy="12" r="2" fill="url(#gradAccent)" />
</svg>