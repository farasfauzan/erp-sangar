<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="scsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e87d2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d46b1a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Badge background -->
  <rect x="10" y="10" width="380" height="100" rx="8" fill="url(#scsGrad)" />

  <!-- Accent line top -->
  <rect x="10" y="10" width="380" height="4" fill="url(#accentGrad)" rx="8 8 0 0" />

  <!-- Accent line bottom -->
  <rect x="10" y="106" width="380" height="4" fill="url(#accentGrad)" rx="0 0 8 8" />

  <!-- Left icon: Building + shield -->
  <g transform="translate(40, 25)" fill="white">
    <!-- Shield shape -->
    <path d="M25 0 L50 0 Q55 0 55 5 L55 35 Q55 45 45 50 Q35 55 25 55 Q15 55 5 50 Q-5 45 -5 35 L-5 5 Q-5 0 0 0 Q10 0 25 0 Z" opacity="0.95" />
    <!-- Building inside shield -->
    <path d="M10 45 L10 20 Q10 15 15 15 L35 15 Q40 15 40 20 L40 45 Z" fill="#1e3a5f" />
    <rect x="16" y="25" width="8" height="8" fill="url(#accentGrad)" />
    <rect x="26" y="25" width="8" height="8" fill="url(#accentGrad)" />
    <rect x="16" y="35" width="8" height="8" fill="url(#accentGrad)" />
    <rect x="26" y="35" width="8" height="8" fill="url(#accentGrad)" />
  </g>

  <!-- Company name -->
  <text x="110" y="55" font-family="Georgia, serif" font-size="22" font-weight="700" fill="white" letter-spacing="0.5">PT. SINAR CERAH SEMPURNA</text>
  <text x="110" y="78" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#a0c4e8" letter-spacing="1.5">KARANGREJO BARAT NO. 9  •  SEMARANG  •  NPWP: 002.652.984.2-331.000</text>

  <!-- Right side: SCS initials badge -->
  <g transform="translate(320, 50)">
    <circle r="30" fill="url(#accentGrad)" opacity="0.95" />
    <text x="0" y="8" font-family="Georgia, serif" font-size="18" font-weight="700" fill="white" text-anchor="middle" letter-spacing="2">SCS</text>
  </g>
</svg>